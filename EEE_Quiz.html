<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EEE Quiz – NMAM Institute of Technology</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#F5A623;--dark:#0A0E1A;--card:#111827;--border:#1E2A3A;
  --green:#22C55E;--red:#EF4444;--blue:#3B82F6;--purple:#8B5CF6;
  --text:#F1F5F9;--muted:#94A3B8;--surface:#1E293B;
}
body{font-family:'Outfit',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden}

/* BACKGROUNDS */
.bg-circuit{position:fixed;inset:0;z-index:0;background:var(--dark);overflow:hidden}
.bg-circuit::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 20%,rgba(139,92,246,0.12) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(59,130,246,0.1) 0%,transparent 60%)}
.bg-circuit svg{position:absolute;inset:0;width:100%;height:100%;opacity:0.04}

/* SCREENS */
.screen{position:relative;z-index:1;display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

/* LANDING */
#landing{background:none}
.logo-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(245,166,35,0.12);border:1px solid rgba(245,166,35,0.3);border-radius:100px;padding:8px 16px;font-size:12px;font-weight:600;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:24px}
.logo-badge span{font-size:16px}
h1.hero{font-size:clamp(2rem,6vw,3.5rem);font-weight:800;line-height:1.1;text-align:center;margin-bottom:8px}
h1.hero .accent{background:linear-gradient(135deg,#F5A623,#F97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{color:var(--muted);font-size:1rem;text-align:center;margin-bottom:36px;max-width:480px}

.name-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;max-width:460px;margin-bottom:20px}
.name-card label{display:block;font-size:13px;font-weight:600;color:var(--gold);letter-spacing:0.5px;margin-bottom:10px;text-transform:uppercase}
.name-card input{width:100%;background:var(--dark);border:1px solid var(--border);border-radius:12px;padding:14px 16px;font-size:16px;color:var(--text);font-family:'Outfit',sans-serif;outline:none;transition:border-color 0.2s}
.name-card input:focus{border-color:var(--gold)}
.name-card input::placeholder{color:var(--muted)}

.unit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
.unit-btn{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;text-align:left;transition:all 0.2s;color:var(--text)}
.unit-btn:hover{border-color:var(--gold);background:rgba(245,166,35,0.06)}
.unit-btn .unit-label{font-size:11px;color:var(--gold);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.unit-btn .unit-name{font-size:13px;font-weight:500;margin-top:4px;color:var(--text)}
.unit-btn .unit-count{font-size:11px;color:var(--muted);margin-top:2px}
.unit-btn.selected{border-color:var(--gold);background:rgba(245,166,35,0.1)}

.btn-start{width:100%;max-width:460px;padding:18px;background:linear-gradient(135deg,#F5A623,#F97316);border:none;border-radius:14px;font-size:16px;font-weight:700;color:#0A0E1A;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.2s;margin-top:16px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(245,166,35,0.35)}
.btn-start:active{transform:translateY(0)}

/* QUIZ SCREEN */
#quiz{padding:0;justify-content:flex-start}
.quiz-header{position:sticky;top:0;z-index:100;background:rgba(10,14,26,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);width:100%;padding:12px 16px}
.quiz-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.quiz-user{font-size:13px;color:var(--muted);font-weight:500}
.quiz-user span{color:var(--gold);font-weight:600}
.timer-pill{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:6px 14px;font-size:14px;font-weight:700;color:var(--text);font-family:'Space Grotesk',sans-serif}
.timer-pill.warning{color:var(--red);border-color:rgba(239,68,68,0.4)}
.timer-dot{width:6px;height:6px;background:var(--green);border-radius:50%}
.timer-pill.warning .timer-dot{background:var(--red)}

.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.progress-bar{width:100%;height:4px;background:var(--border);border-radius:100px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#F5A623,#F97316);border-radius:100px;transition:width 0.4s ease}

.quiz-body{width:100%;max-width:580px;margin:0 auto;padding:20px 16px 100px}
.unit-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.3);border-radius:100px;padding:4px 12px;font-size:11px;font-weight:600;color:#A78BFA;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:16px}

.q-number{font-size:13px;color:var(--muted);margin-bottom:8px;font-weight:500}
.q-text{font-size:1.05rem;font-weight:500;line-height:1.6;margin-bottom:24px;color:var(--text)}

.options{display:flex;flex-direction:column;gap:10px}
.option{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all 0.18s;color:var(--text);font-size:0.95rem;line-height:1.5;font-family:'Outfit',sans-serif;text-align:left;width:100%}
.option:hover:not(:disabled){border-color:#4B5563;background:var(--surface)}
.option .opt-letter{width:28px;height:28px;border-radius:8px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:'Space Grotesk',sans-serif;color:var(--muted)}
.option.correct{border-color:var(--green);background:rgba(34,197,94,0.08)}
.option.correct .opt-letter{background:var(--green);border-color:var(--green);color:#fff}
.option.wrong{border-color:var(--red);background:rgba(239,68,68,0.08)}
.option.wrong .opt-letter{background:var(--red);border-color:var(--red);color:#fff}
.option.disabled{cursor:default}
.option.correct .opt-text,.option.wrong .opt-text{font-weight:500}

.feedback-msg{margin-top:12px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;display:none;align-items:center;gap:8px}
.feedback-msg.show{display:flex}
.feedback-msg.correct{background:rgba(34,197,94,0.12);color:#4ADE80;border:1px solid rgba(34,197,94,0.25)}
.feedback-msg.wrong{background:rgba(239,68,68,0.12);color:#F87171;border:1px solid rgba(239,68,68,0.25)}

.quiz-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,14,26,0.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:12px 16px}
.nav-inner{display:flex;align-items:center;justify-content:space-between;max-width:580px;margin:0 auto;gap:10px}
.btn-nav{padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;border:none;transition:all 0.2s}
.btn-prev{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.btn-prev:hover{border-color:#4B5563}
.btn-next{background:linear-gradient(135deg,#F5A623,#F97316);color:#0A0E1A;flex:1}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(245,166,35,0.3)}
.btn-submit-quiz{background:linear-gradient(135deg,#8B5CF6,#6D28D9);color:#fff;flex:1}
.btn-submit-quiz:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(139,92,246,0.3)}

/* RESULTS */
#results{padding:20px}
.results-card{background:var(--card);border:1px solid var(--border);border-radius:24px;width:100%;max-width:520px;overflow:hidden}
.results-header{padding:32px;text-align:center;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(245,166,35,0.08),rgba(139,92,246,0.06))}
.score-ring{width:120px;height:120px;margin:0 auto 16px;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .score-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif}
.score-ring .score-pct{font-size:28px;font-weight:700}
.score-ring .score-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.results-name{font-size:1.2rem;font-weight:700;margin-bottom:4px}
.results-unit{font-size:13px;color:var(--gold);margin-bottom:8px}
.grade-badge{display:inline-block;padding:6px 18px;border-radius:100px;font-size:13px;font-weight:700;margin-top:8px}
.grade-A{background:rgba(34,197,94,0.15);color:#4ADE80;border:1px solid rgba(34,197,94,0.3)}
.grade-B{background:rgba(59,130,246,0.15);color:#60A5FA;border:1px solid rgba(59,130,246,0.3)}
.grade-C{background:rgba(245,166,35,0.15);color:#FBBF24;border:1px solid rgba(245,166,35,0.3)}
.grade-D{background:rgba(239,68,68,0.15);color:#F87171;border:1px solid rgba(239,68,68,0.3)}

.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border-bottom:1px solid var(--border)}
.stat-box{padding:16px;text-align:center;border-right:1px solid var(--border)}
.stat-box:last-child{border-right:none}
.stat-val{font-size:1.6rem;font-weight:800;font-family:'Space Grotesk',sans-serif}
.stat-val.green{color:var(--green)}
.stat-val.red{color:var(--red)}
.stat-val.blue{color:var(--blue)}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}

.results-actions{padding:16px;display:flex;flex-direction:column;gap:10px}
.btn-review{width:100%;padding:14px;border-radius:12px;border:1.5px solid var(--gold);background:transparent;color:var(--gold);font-size:15px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.2s}
.btn-review:hover{background:rgba(245,166,35,0.08)}
.btn-retake{width:100%;padding:14px;border-radius:12px;border:none;background:var(--surface);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.2s}
.btn-retake:hover{background:#253044}
.btn-home{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#F5A623,#F97316);color:#0A0E1A;font-size:15px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.2s}
.btn-home:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(245,166,35,0.3)}

/* REVIEW */
#review{padding:20px;justify-content:flex-start;align-items:stretch}
.review-header{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.review-header h2{font-size:1rem;font-weight:700;flex:1}
.btn-back{padding:8px 16px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif}
.review-list{max-width:580px;margin:0 auto;width:100%}
.review-item{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;border:1.5px solid var(--border)}
.review-item.r-correct{border-color:rgba(34,197,94,0.35)}
.review-item.r-wrong{border-color:rgba(239,68,68,0.35)}
.review-item.r-skip{border-color:rgba(148,163,184,0.3)}
.review-qnum{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.review-qtxt{font-size:14px;font-weight:500;margin-bottom:12px;line-height:1.5}
.review-opts{display:flex;flex-direction:column;gap:6px}
.review-opt{padding:8px 12px;border-radius:8px;font-size:13px;border:1px solid transparent;display:flex;align-items:center;gap:8px}
.review-opt.r-correct-opt{background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.3);color:#4ADE80}
.review-opt.r-wrong-opt{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3);color:#F87171}
.review-opt .r-tick{font-size:14px}
.review-status{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;margin-bottom:8px}
.rs-correct{background:rgba(34,197,94,0.15);color:#4ADE80}
.rs-wrong{background:rgba(239,68,68,0.15);color:#F87171}
.rs-skip{background:rgba(148,163,184,0.15);color:var(--muted)}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp 0.35s ease forwards}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.pulse{animation:pulse 1s infinite}
</style>
</head>
<body>

<div class="bg-circuit">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
<defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0L0 0 0 40" fill="none" stroke="#fff" stroke-width="0.5"/></pattern></defs>
<rect width="800" height="600" fill="url(#grid)"/>
<circle cx="80" cy="80" r="4" fill="#F5A623"/><circle cx="200" cy="120" r="4" fill="#8B5CF6"/><circle cx="400" cy="60" r="4" fill="#3B82F6"/>
<circle cx="600" cy="100" r="4" fill="#F5A623"/><circle cx="720" cy="200" r="4" fill="#8B5CF6"/>
<line x1="80" y1="80" x2="200" y2="120" stroke="#F5A623" stroke-width="0.8"/>
<line x1="200" y1="120" x2="400" y2="60" stroke="#8B5CF6" stroke-width="0.8"/>
<line x1="400" y1="60" x2="600" y2="100" stroke="#3B82F6" stroke-width="0.8"/>
<line x1="600" y1="100" x2="720" y2="200" stroke="#F5A623" stroke-width="0.8"/>
<circle cx="160" cy="400" r="4" fill="#22C55E"/><circle cx="320" cy="350" r="4" fill="#F5A623"/>
<circle cx="480" cy="420" r="4" fill="#8B5CF6"/><circle cx="640" cy="380" r="4" fill="#3B82F6"/>
<line x1="160" y1="400" x2="320" y2="350" stroke="#22C55E" stroke-width="0.8"/>
<line x1="320" y1="350" x2="480" y2="420" stroke="#F5A623" stroke-width="0.8"/>
<line x1="480" y1="420" x2="640" y2="380" stroke="#8B5CF6" stroke-width="0.8"/>
</svg>
</div>

<!-- LANDING SCREEN -->
<div id="landing" class="screen active">
  <div class="logo-badge"><span>⚡</span>NMAM Institute of Technology</div>
  <h1 class="hero">EEE <span class="accent">MCQ Quiz</span></h1>
  <p class="subtitle">Department of Electrical & Electronics Engineering · Unit-wise Assessment</p>

  <div class="name-card fade-up">
    <label>Your Name</label>
    <input type="text" id="studentName" placeholder="Enter your full name to begin..." autocomplete="off" />

    <div style="margin-top:20px">
      <label style="display:block;font-size:13px;font-weight:600;color:#A78BFA;letter-spacing:0.5px;margin-bottom:12px;text-transform:uppercase">Select Unit</label>
      <div class="unit-grid" id="unitGrid"></div>
    </div>
  </div>

  <button class="btn-start" onclick="startQuiz()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5,3 19,12 5,21"/></svg>
    Start Quiz
  </button>
</div>

<!-- QUIZ SCREEN -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <div class="quiz-header-top">
      <div class="quiz-user">👤 <span id="displayName">Student</span></div>
      <div class="timer-pill" id="timerPill">
        <div class="timer-dot"></div>
        <span id="timerDisplay">30:00</span>
      </div>
    </div>
    <div class="progress-info">
      <span id="progressLabel">Question 1 of 29</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="quiz-body">
    <div class="unit-tag" id="qUnitTag">⚡ Unit 1</div>
    <div class="q-number" id="qNum">Question 1</div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="optionsContainer"></div>
    <div class="feedback-msg" id="feedbackMsg"></div>
  </div>

  <div class="quiz-nav">
    <div class="nav-inner">
      <button class="btn-nav btn-prev" onclick="prevQuestion()">← Prev</button>
      <button class="btn-nav btn-next" id="btnNext" onclick="nextQuestion()">Next →</button>
    </div>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="results" class="screen">
  <div class="results-card fade-up">
    <div class="results-header">
      <div class="score-ring">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="50" fill="none" stroke="#1E293B" stroke-width="10"/>
          <circle cx="60" cy="60" r="50" fill="none" stroke="url(#scoreGrad)" stroke-width="10" stroke-linecap="round" id="scoreArc" stroke-dasharray="314" stroke-dashoffset="314"/>
          <defs><linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#F5A623"/><stop offset="100%" stop-color="#8B5CF6"/></linearGradient></defs>
        </svg>
        <div class="score-num">
          <div class="score-pct" id="scorePct">0%</div>
          <div class="score-lbl">Score</div>
        </div>
      </div>
      <div class="results-name" id="resultsName">Student</div>
      <div class="results-unit" id="resultsUnit">Unit 1</div>
      <div class="grade-badge" id="gradeBadge">Grade A</div>
    </div>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-val green" id="statCorrect">0</div>
        <div class="stat-label">Correct</div>
      </div>
      <div class="stat-box">
        <div class="stat-val red" id="statWrong">0</div>
        <div class="stat-label">Wrong</div>
      </div>
      <div class="stat-box">
        <div class="stat-val blue" id="statSkipped">0</div>
        <div class="stat-label">Skipped</div>
      </div>
    </div>

    <div class="results-actions">
      <button class="btn-review" onclick="showReview()">📋 Review All Questions</button>
      <button class="btn-retake" onclick="retakeQuiz()">↺ Retake This Unit</button>
      <button class="btn-home" onclick="goHome()">⚡ Choose Another Unit</button>
    </div>
  </div>
</div>

<!-- REVIEW SCREEN -->
<div id="review" class="screen" style="align-items:stretch;justify-content:flex-start">
  <div style="max-width:580px;margin:0 auto;width:100%;padding:16px">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;position:sticky;top:0;z-index:50;background:var(--dark);padding:8px 0">
      <button class="btn-back" onclick="showResults()">← Back</button>
      <h2 style="font-size:1rem;font-weight:700;flex:1">Review Questions</h2>
      <div style="font-size:12px;color:var(--muted)" id="reviewMeta"></div>
    </div>
    <div id="reviewList"></div>
  </div>
</div>

<script>
const UNITS = [
  {id:1,name:"Circuit Fundamentals",desc:"Ohm's Law, KVL, KCL, Graph Theory, Mesh & Nodal Analysis"},
  {id:2,name:"AC Circuits",desc:"RMS, Phasors, Power, Resonance"},
  {id:3,name:"Power Systems & Machines",desc:"Energy Sources, Transformers, Motors, EVs"},
  {id:4,name:"Power Electronics & EVs",desc:"Buck/Boost, UPS, EV Systems, Motors"},
  {id:5,name:"Magnetic Circuits & Machines",desc:"Transformers, DC Motors, Stepper, Protection"}
];

const ALL_QUESTIONS = {
  1:[
    {q:"Which of the following elements of electrical engineering cannot be analyzed using Ohm's law?",opts:["Capacitors","Inductors","Transistors","Resistance"],ans:2},
    {q:"Which of the following according to KVL must be zero?",opts:["Algebraic sum of currents in closed-loop","Algebraic sum of power in closed-loop","Algebraic sum of losses in closed-loop","Algebraic sum of voltages in closed-loop"],ans:3},
    {q:"Kirchhoff's Law is applicable to",opts:["Passive network only","A.C. Network only","D.C. network only","Both A.C and D.C circuits"],ans:3},
    {q:"KCL works on the principle of which of the following",opts:["Law of conservation of charge","Law of conservation of energy","Both","None of the above"],ans:0},
    {q:"KVL works on the principle of",opts:["Law of conservation of charge","Law of conservation of energy","Both","None of the above"],ans:1},
    {q:"Potential difference between two points of a wire carrying 2A current is 0.1V. The resistance of the wire is",opts:["0.5 ohm","0.05 ohm","0.25 ohm","5 ohm"],ans:1},
    {q:"Which of the following statements are true? Statement 1: A tree is a graph but a graph is not a tree. Statement 2: Both trees and graphs are non linear data structures.",opts:["Only statement 1 is true","Only statement 2 is true","Both statement 1 and statement 2 are true","None of them is true"],ans:2},

// State
let studentName='',selectedUnit=1,questions=[],currentQ=0,answers=[],timer=null,timeLeft=1800;

// Build unit grid
const unitGrid=document.getElementById('unitGrid');
UNITS.forEach(u=>{
  const btn=document.createElement('button');
  btn.className='unit-btn'+(u.id===1?' selected':'');
  btn.onclick=()=>{
    selectedUnit=u.id;
    document.querySelectorAll('.unit-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
  };
  btn.innerHTML=`<div class="unit-label">Unit ${u.id}</div><div class="unit-name">${u.name}</div><div class="unit-count">${ALL_QUESTIONS[u.id].length} Questions</div>`;
  unitGrid.appendChild(btn);
});

function startQuiz(){
  studentName=document.getElementById('studentName').value.trim();
  if(!studentName){alert('Please enter your name to begin!');return;}
  questions=ALL_QUESTIONS[selectedUnit];
  answers=new Array(questions.length).fill(null);
  currentQ=0;timeLeft=1800;
  document.getElementById('displayName').textContent=studentName;
  showScreen('quiz');
  renderQuestion();
  startTimer();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');s.style.display='none';});
  const s=document.getElementById(id);s.classList.add('active');s.style.display='flex';
}

function startTimer(){
  clearInterval(timer);
  timer=setInterval(()=>{
    timeLeft--;
    updateTimer();
    if(timeLeft<=0){clearInterval(timer);submitQuiz();}
  },1000);
}

function updateTimer(){
  const m=Math.floor(timeLeft/60),s=timeLeft%60;
  document.getElementById('timerDisplay').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const pill=document.getElementById('timerPill');
  if(timeLeft<=300){pill.classList.add('warning');}else{pill.classList.remove('warning');}
}

function renderQuestion(){
  const q=questions[currentQ];
  const total=questions.length;
  const pct=Math.round((currentQ/total)*100);
  document.getElementById('progressLabel').textContent=`Question ${currentQ+1} of ${total}`;
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('progressFill').style.width=pct+'%';
  const unitObj=UNITS.find(u=>u.id===selectedUnit);
  document.getElementById('qUnitTag').textContent=`⚡ Unit ${selectedUnit} · ${unitObj.name}`;
  document.getElementById('qNum').textContent=`Question ${currentQ+1}`;
  document.getElementById('qText').textContent=q.q;

  const opts=document.getElementById('optionsContainer');
  opts.innerHTML='';
  const letters=['A','B','C','D'];
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='option';
    btn.innerHTML=`<span class="opt-letter">${letters[i]}</span><span class="opt-text">${opt}</span>`;
    if(answers[currentQ]!==null){
      btn.disabled=true;btn.classList.add('disabled');
      if(i===q.ans)btn.classList.add('correct');
      else if(i===answers[currentQ])btn.classList.add('wrong');
    } else {
      btn.onclick=()=>selectAnswer(i);
    }
    opts.appendChild(btn);
  });

  // Show feedback if already answered
  const fb=document.getElementById('feedbackMsg');
  fb.className='feedback-msg';
  if(answers[currentQ]!==null){
    if(answers[currentQ]===q.ans){
      fb.className='feedback-msg show correct';
      fb.innerHTML='✅ Correct! Well done.';
    } else {
      fb.className='feedback-msg show wrong';
      fb.innerHTML=`❌ Wrong! Correct answer: <strong style="margin-left:4px">${q.opts[q.ans]}</strong>`;
    }
  }

  // Next/Submit button
  const btnNext=document.getElementById('btnNext');
  if(currentQ===total-1){
    btnNext.textContent='Submit Quiz';
    btnNext.className='btn-nav btn-submit-quiz';
    btnNext.onclick=submitQuiz;
  } else {
    btnNext.textContent='Next →';
    btnNext.className='btn-nav btn-next';
    btnNext.onclick=nextQuestion;
  }
}

function selectAnswer(idx){
  if(answers[currentQ]!==null)return;
  answers[currentQ]=idx;
  const q=questions[currentQ];
  const opts=document.querySelectorAll('.option');
  opts.forEach((btn,i)=>{
    btn.disabled=true;btn.classList.add('disabled');
    if(i===q.ans)btn.classList.add('correct');
    else if(i===idx)btn.classList.add('wrong');
  });
  const fb=document.getElementById('feedbackMsg');
  if(idx===q.ans){
    fb.className='feedback-msg show correct';
    fb.innerHTML='✅ Correct! Well done.';
  } else {
    fb.className='feedback-msg show wrong';
    fb.innerHTML=`❌ Wrong! Correct answer: <strong style="margin-left:4px">${q.opts[q.ans]}</strong>`;
  }
}

function nextQuestion(){if(currentQ<questions.length-1){currentQ++;renderQuestion();window.scrollTo(0,0);}}
function prevQuestion(){if(currentQ>0){currentQ--;renderQuestion();window.scrollTo(0,0);}}

function submitQuiz(){
  clearInterval(timer);
  const correct=answers.filter((a,i)=>a===questions[i].ans).length;
  const wrong=answers.filter((a,i)=>a!==null&&a!==questions[i].ans).length;
  const skipped=answers.filter(a=>a===null).length;
  const pct=Math.round((correct/questions.length)*100);
  const unitObj=UNITS.find(u=>u.id===selectedUnit);

  document.getElementById('resultsName').textContent=studentName;
  document.getElementById('resultsUnit').textContent=`Unit ${selectedUnit}: ${unitObj.name}`;
  document.getElementById('statCorrect').textContent=correct;
  document.getElementById('statWrong').textContent=wrong;
  document.getElementById('statSkipped').textContent=skipped;
  document.getElementById('scorePct').textContent=pct+'%';

  // Animate ring
  const circ=314;
  const offset=circ-(circ*pct/100);
  document.getElementById('scoreArc').style.strokeDashoffset=offset;

  let grade,cls;
  if(pct>=80){grade='Grade A — Excellent!';cls='grade-A';}
  else if(pct>=60){grade='Grade B — Good';cls='grade-B';}
  else if(pct>=40){grade='Grade C — Average';cls='grade-C';}
  else{grade='Grade D — Needs Improvement';cls='grade-D';}
  const gb=document.getElementById('gradeBadge');gb.textContent=grade;gb.className='grade-badge '+cls;

  showScreen('results');
}

function showReview(){
  const reviewList=document.getElementById('reviewList');
  reviewList.innerHTML='';
  const unitObj=UNITS.find(u=>u.id===selectedUnit);
  document.getElementById('reviewMeta').textContent=`Unit ${selectedUnit} · ${questions.length} Qs`;
  const letters=['A','B','C','D'];
  questions.forEach((q,i)=>{
    const userAns=answers[i];
    const isCorrect=userAns===q.ans;
    const isSkipped=userAns===null;
    const item=document.createElement('div');
    item.className='review-item '+(isSkipped?'r-skip':isCorrect?'r-correct':'r-wrong');
    let statusHtml=isSkipped?'<span class="review-status rs-skip">⏭ Skipped</span>':isCorrect?'<span class="review-status rs-correct">✓ Correct</span>':'<span class="review-status rs-wrong">✗ Wrong</span>';
    let optsHtml='';
    q.opts.forEach((opt,j)=>{
      let cls='review-opt';
      let tick='';
      if(j===q.ans){cls+=' r-correct-opt';tick='✓';}
      else if(j===userAns&&!isCorrect){cls+=' r-wrong-opt';tick='✗';}
      optsHtml+=`<div class="${cls}"><span class="r-tick">${tick||'·'}</span><strong>${letters[j]}.</strong> ${opt}</div>`;
    });
    item.innerHTML=`<div class="review-qnum">Q${i+1}</div>${statusHtml}<div class="review-qtxt">${q.q}</div><div class="review-opts">${optsHtml}</div>`;
    reviewList.appendChild(item);
  });
  showScreen('review');
  window.scrollTo(0,0);
}

function showResults(){showScreen('results');}
function retakeQuiz(){answers=new Array(questions.length).fill(null);currentQ=0;timeLeft=1800;showScreen('quiz');renderQuestion();startTimer();}
function goHome(){clearInterval(timer);document.getElementById('studentName').value='';showScreen('landing');}
</script>
